<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Mark IV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>J.A.R.V.I.S.</h1>
            </div>
            <div class="status">
                <span id="backend-status" class="offline">LOCAL DISCONNECTED</span>
            </div>
        </header>

        <main id="chat-window">
            <div class="message system">
                <div class="content">Welcome back, Sir. How can I assist you today?</div>
            </div>
        </main>

        <footer>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type a command or ask a question..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
                <button id="mic-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>
            <div class="settings">
                <input type="password" id="api-token" placeholder="Access Token" value="StarkIndustries2026">
                <input type="text" id="backend-url" placeholder="Backend URL" value="http://localhost:5000">
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
